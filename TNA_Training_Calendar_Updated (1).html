<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNA Training Calendar — June & July 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black-green: #072929;
    --black-green-12: rgba(7,41,41,0.12);
    --key-lime: #B1FA63;
    --key-lime-12: rgba(177,250,99,0.12);
    --orange: #FE7733;
    --orange-15: rgba(254,119,51,0.15);
    --sky-blue: #6AD9FF;
    --sky-blue-15: rgba(106,217,255,0.15);
    --lilac: #D4ACFF;
    --lilac-15: rgba(212,172,255,0.15);
    --coffee-cream: #F3EAE2;
    --ash-white: #F4F2F0;
    --white: #ffffff;
    --text-dark: #072929;
    --text-mid: #4a5a5a;
    --text-light: #7a8f8f;
    --border: rgba(7,41,41,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--ash-white);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(177,250,99,0.12) 0%, transparent 45%),
      radial-gradient(ellipse at 90% 100%, rgba(7,41,41,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    background: var(--black-green);
    padding: 0 60px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 40px;
    min-height: 180px;
    overflow: hidden;
  }

  header::after {
    content: '';
    position: absolute;
    right: -60px; top: -60px;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: var(--key-lime);
    opacity: 0.07;
    pointer-events: none;
  }

  .header-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--key-lime);
    margin-bottom: 14px;
  }

  .header-eyebrow span { width: 20px; height: 2px; background: var(--key-lime); display: inline-block; }

  h1 {
    font-family: 'Inter Tight', sans-serif;
    font-size: clamp(34px, 4.5vw, 58px);
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.03em;
    line-height: 1.0;
  }

  h1 .accent { color: var(--key-lime); }

  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    margin-top: 10px;
    font-weight: 400;
  }

  .header-stats { display: flex; gap: 0; position: relative; z-index: 1; }

  .stat { text-align: center; padding: 20px 28px; border-left: 1px solid rgba(255,255,255,0.08); }
  .stat:first-child { border-left: none; }

  .stat-num {
    font-family: 'Inter Tight', sans-serif;
    font-size: 38px;
    font-weight: 800;
    color: var(--key-lime);
    line-height: 1;
    letter-spacing: -0.03em;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-top: 5px;
  }

  /* ── FILTERS BAR ── */
  .filters-bar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(244,242,240,0.97);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 12px 60px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 20px rgba(7,41,41,0.06);
  }

  .filter-label {
    font-family: 'Inter Tight', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-right: 2px;
    flex-shrink: 0;
  }

  .filter-divider {
    width: 1px;
    height: 22px;
    background: var(--border);
    flex-shrink: 0;
    margin: 0 4px;
  }

  /* Month tabs */
  .month-tab {
    cursor: pointer;
    font-family: 'Inter Tight', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 16px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text-mid);
    transition: all 0.18s ease;
    user-select: none;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .month-tab:hover { border-color: var(--black-green); color: var(--black-green); background: rgba(7,41,41,0.04); }
  .month-tab.active { background: var(--black-green); color: var(--key-lime); border-color: var(--black-green); }

  /* Topic dropdown */
  .topic-dropdown-wrap { position: relative; flex-shrink: 0; }

  .topic-dropdown-btn {
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 13px 7px 15px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text-mid);
    transition: all 0.18s ease;
    user-select: none;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
  }

  .topic-dropdown-btn:hover,
  .topic-dropdown-btn.open { border-color: var(--black-green); color: var(--black-green); }

  .topic-dropdown-btn.has-filter {
    background: var(--black-green);
    color: var(--key-lime);
    border-color: var(--black-green);
    font-weight: 600;
  }

  .topic-dropdown-btn.has-filter:hover { background: #0d3f3f; }

  .dropdown-arrow {
    width: 14px; height: 14px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .topic-dropdown-btn.open .dropdown-arrow { transform: rotate(180deg); }

  .topic-dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 7px);
    left: 0;
    min-width: 230px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(7,41,41,0.13);
    overflow: hidden;
    z-index: 300;
    animation: dropIn 0.18s cubic-bezier(0.34,1.56,0.64,1);
  }

  .topic-dropdown-menu.open { display: block; }

  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-6px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-mid);
    cursor: pointer;
    transition: background 0.12s;
    border-bottom: 1px solid rgba(7,41,41,0.05);
  }

  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: var(--ash-white); color: var(--black-green); }
  .dropdown-item.active { background: var(--key-lime-12); color: var(--black-green); font-weight: 600; }

  .dropdown-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── MAIN ── */
  main { position: relative; z-index: 1; padding: 36px 60px 72px; }

  .month-section { margin-bottom: 48px; }
  .month-section.hidden { display: none; }

  .month-title {
    font-family: 'Inter Tight', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .month-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 2px 24px rgba(7,41,41,0.07);
    background: var(--white);
  }

  .day-header {
    padding: 13px 0;
    text-align: center;
    font-family: 'Inter Tight', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--black-green);
    color: rgba(177,250,99,0.75);
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  .day-header:last-child { border-right: none; }

  .day-cell {
    min-height: 108px;
    padding: 10px 9px 8px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    transition: background 0.14s;
  }

  .day-cell:hover { background: rgba(177,250,99,0.05); }
  .day-cell.empty { background: rgba(7,41,41,0.02); }
  .day-cell.has-events { cursor: pointer; }
  .day-cell.weekend { background: rgba(7,41,41,0.015); }

  .day-num {
    font-family: 'Inter Tight', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--black-green);
    line-height: 1;
    margin-bottom: 7px;
  }

  .day-cell.empty .day-num { color: rgba(7,41,41,0.2); }

  .event-chip {
    display: block;
    font-size: 9.5px;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 5px;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.12s;
    line-height: 1.5;
  }

  .event-chip:hover { opacity: 0.8; transform: translateX(2px); }

  .chip-lime   { background: var(--key-lime-12);    color: #3a6600;            border-left: 2.5px solid var(--key-lime); }
  .chip-orange { background: var(--orange-15);      color: #8a3800;            border-left: 2.5px solid var(--orange); }
  .chip-blue   { background: var(--sky-blue-15);    color: #004466;            border-left: 2.5px solid var(--sky-blue); }
  .chip-lilac  { background: var(--lilac-15);       color: #4a1e7a;            border-left: 2.5px solid var(--lilac); }
  .chip-dark   { background: var(--black-green-12); color: var(--black-green); border-left: 2.5px solid var(--black-green); }

  .more-badge {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-light);
    margin-top: 2px;
    padding-left: 2px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(7,41,41,0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--ash-white);
    border-radius: 20px;
    max-width: 420px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(7,41,41,0.35);
    animation: modalIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    background: var(--black-green);
    padding: 26px 26px 22px;
    position: relative;
    overflow: hidden;
  }

  .modal-header::before {
    content: '';
    position: absolute;
    right: -40px; bottom: -50px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: var(--key-lime);
    opacity: 0.08;
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 18px;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(177,250,99,0.1);
    border: 1px solid rgba(177,250,99,0.2);
    color: rgba(255,255,255,0.7);
    font-size: 17px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    font-family: 'Inter', sans-serif;
    z-index: 1;
  }

  .modal-close:hover { background: rgba(177,250,99,0.2); color: var(--key-lime); }

  .modal-date-tag {
    font-family: 'Inter Tight', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--key-lime);
    opacity: 0.8;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .modal-title {
    font-family: 'Inter Tight', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--white);
    line-height: 1.2;
    letter-spacing: -0.02em;
    position: relative;
    z-index: 1;
  }

  .modal-body { padding: 20px 26px 26px; }

  .modal-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }

  .modal-row:last-child { border-bottom: none; }

  .modal-row-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--coffee-cream);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
    border: 1px solid var(--border);
  }

  .modal-row-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 4px;
  }

  .modal-row-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--black-green);
    line-height: 1.4;
  }

  .modal-row-sub {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-mid);
    margin-top: 2px;
    line-height: 1.5;
  }

  /* ── REGISTER BUTTON ── */
  .modal-register-wrap {
    padding: 0 26px 26px;
  }

  .modal-register-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px 20px;
    background: var(--black-green);
    color: var(--key-lime);
    font-family: 'Inter Tight', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-decoration: none;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: 0 4px 16px rgba(7,41,41,0.18);
  }

  .modal-register-btn:hover {
    background: #0d3f3f;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(7,41,41,0.25);
  }

  .modal-register-btn:active { transform: translateY(0); }

  .modal-register-btn svg {
    width: 16px; height: 16px;
    flex-shrink: 0;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 820px) {
    header { padding: 32px 20px; grid-template-columns: 1fr; min-height: auto; }
    .header-stats { display: grid; grid-template-columns: repeat(3,1fr); border-top: 1px solid rgba(255,255,255,0.08); margin-top: 20px; }
    .stat { border-left: none; border-right: 1px solid rgba(255,255,255,0.08); padding: 16px 12px; }
    .filters-bar, main { padding-left: 16px; padding-right: 16px; }
    .day-cell { min-height: 64px; padding: 7px 5px; }
    .day-num { font-size: 13px; }
    .event-chip { display: none; }
    .more-badge { display: block; }
    h1 { font-size: 30px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="header-eyebrow"><span></span>TNA Program 2026</div>
    <h1>Training <span class="accent">Calendar</span></h1>
    <p class="header-sub">June – July 2026 &nbsp;·&nbsp; Talent &amp; Capability Development</p>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="statSessions">22</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statTopics">12</div>
      <div class="stat-label">Topics</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statSeats">563</div>
      <div class="stat-label">Enrollments</div>
    </div>
  </div>
</header>

<!-- FILTERS BAR -->
<div class="filters-bar">
  <span class="filter-label">Month</span>
  <div class="month-tab active" data-month="all">All</div>
  <div class="month-tab" data-month="June">June</div>
  <div class="month-tab" data-month="July">July</div>

  <div class="filter-divider"></div>

  <span class="filter-label">Topic</span>
  <div class="topic-dropdown-wrap">
    <button class="topic-dropdown-btn" id="topicDropdownBtn" onclick="toggleDropdown()">
      <span id="topicDropdownLabel">All Topics</span>
      <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
    </button>
    <div class="topic-dropdown-menu" id="topicDropdownMenu"></div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div id="calendarView">
    <div class="month-section" id="juneSection">
      <div class="month-title">June 2026</div>
      <div class="month-grid" id="juneGrid">
        <div class="day-header">Sun</div><div class="day-header">Mon</div>
        <div class="day-header">Tue</div><div class="day-header">Wed</div>
        <div class="day-header">Thu</div><div class="day-header">Fri</div>
        <div class="day-header">Sat</div>
      </div>
    </div>
    <div class="month-section" id="julySection">
      <div class="month-title">July 2026</div>
      <div class="month-grid" id="julyGrid">
        <div class="day-header">Sun</div><div class="day-header">Mon</div>
        <div class="day-header">Tue</div><div class="day-header">Wed</div>
        <div class="day-header">Thu</div><div class="day-header">Fri</div>
        <div class="day-header">Sat</div>
      </div>
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModalDirect()">×</button>
      <div class="modal-date-tag" id="modalDate"></div>
      <div class="modal-title" id="modalTitle"></div>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-register-wrap" id="modalRegisterWrap"></div>
  </div>
</div>

const chipClasses = ['chip-lime','chip-orange','chip-blue','chip-lilac','chip-dark'];
const dotColors   = ['#B1FA63','#FE7733','#6AD9FF','#D4ACFF','#072929'];
const topicColorMap = {};
let colorIdx = 0;
function getTopicColor(topic) {
  if (topicColorMap[topic] === undefined) topicColorMap[topic] = colorIdx++ % 5;
  return topicColorMap[topic];
}
sessions.forEach(s => getTopicColor(s.topic)); // seed stable order

// ── STATE ──
let activeMonth = 'all';
let activeTopic = 'all';

function getFiltered() {
  return sessions.filter(s =>
    (activeMonth === 'all' || s.month === activeMonth) &&
    (activeTopic === 'all' || s.topic === activeTopic)
  );
}

// ── STATS ──
function updateStats() {
  const f = getFiltered();
  document.getElementById('statSessions').textContent = f.length;
  document.getElementById('statTopics').textContent = new Set(f.map(s => s.topic)).size;
  document.getElementById('statSeats').textContent = f.reduce((a,s) => a + s.count, 0);
}

// ── MONTH VISIBILITY ──
function applyMonthVisibility() {
  const june = document.getElementById('juneSection');
  const july = document.getElementById('julySection');
  june.classList.toggle('hidden', activeMonth === 'July');
  july.classList.toggle('hidden', activeMonth === 'June');
}

// ── BUILD CALENDAR ──
function buildMonth(gridId, monthName, firstDow, daysInMonth) {
  const grid = document.getElementById(gridId);
  grid.querySelectorAll('.day-cell').forEach(c => c.remove());

  const filtered = getFiltered().filter(s => s.month === monthName);
  const byDay = {};
  filtered.forEach(s => { if (!byDay[s.day]) byDay[s.day] = []; byDay[s.day].push(s); });

  const allByDay = {};
  sessions.filter(s => s.month === monthName).forEach(s => {
    if (!allByDay[s.day]) allByDay[s.day] = [];
    allByDay[s.day].push(s);
  });

  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'day-cell empty' + ((i===0||i===6)?' weekend':'');
    el.innerHTML = '<span class="day-num">·</span>';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const daySessions = byDay[d] || [];
    const dow = (firstDow + d - 1) % 7;
    const cell = document.createElement('div');
    cell.className = 'day-cell' +
      (daySessions.length ? ' has-events' : '') +
      (dow===0||dow===6 ? ' weekend' : '');

    let html = `<div class="day-num">${d}</div>`;
    daySessions.slice(0,2).forEach(s => {
      const c = chipClasses[getTopicColor(s.topic)];
      html += `<span class="event-chip ${c}" onclick="event.stopPropagation();openModal(${s.id})">${s.topic}</span>`;
    });
    if (daySessions.length > 2) html += `<div class="more-badge">+${daySessions.length-2} more</div>`;
    if (!daySessions.length && allByDay[d] && allByDay[d].length)
      html += `<div class="more-badge" style="color:rgba(7,41,41,0.22);">${allByDay[d].length} filtered</div>`;

    cell.innerHTML = html;
    if (daySessions.length === 1) cell.addEventListener('click', () => openModal(daySessions[0].id));
    grid.appendChild(cell);
  }

  const rem = (firstDow + daysInMonth) % 7;
  if (rem !== 0) {
    for (let i = 0; i < 7 - rem; i++) {
      const dow = (firstDow + daysInMonth + i) % 7;
      const el = document.createElement('div');
      el.className = 'day-cell empty' + (dow===0||dow===6?' weekend':'');
      el.innerHTML = '<span class="day-num">·</span>';
      grid.appendChild(el);
    }
  }
}

function buildCalendar() {
  buildMonth('juneGrid', 'June', 1, 30);
  buildMonth('julyGrid', 'July', 3, 31);
  applyMonthVisibility();
}

// ── TOPIC DROPDOWN ──
function buildDropdown() {
  const menu = document.getElementById('topicDropdownMenu');
  const topics = [...new Set(sessions.map(s => s.topic))];
  let html = `<div class="dropdown-item${activeTopic==='all'?' active':''}" onclick="selectTopic('all')">
    <span class="dropdown-dot" style="background:rgba(7,41,41,0.2);"></span>All Topics
  </div>`;
  topics.forEach(t => {
    const safeT = t.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += `<div class="dropdown-item${activeTopic===t?' active':''}" onclick="selectTopic('${safeT}')">
      <span class="dropdown-dot" style="background:${dotColors[getTopicColor(t)]};"></span>${t}
    </div>`;
  });
  menu.innerHTML = html;
}

function toggleDropdown() {
  const btn = document.getElementById('topicDropdownBtn');
  const menu = document.getElementById('topicDropdownMenu');
  const willOpen = !menu.classList.contains('open');
  menu.classList.toggle('open', willOpen);
  btn.classList.toggle('open', willOpen);
}

function selectTopic(topic) {
  activeTopic = topic;
  document.getElementById('topicDropdownLabel').textContent = topic === 'all' ? 'All Topics' : topic;
  const btn = document.getElementById('topicDropdownBtn');
  btn.classList.toggle('has-filter', topic !== 'all');
  document.getElementById('topicDropdownMenu').classList.remove('open');
  btn.classList.remove('open');
  buildDropdown();
  updateStats();
  buildCalendar();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.topic-dropdown-wrap')) {
    document.getElementById('topicDropdownMenu').classList.remove('open');
    document.getElementById('topicDropdownBtn').classList.remove('open');
  }
});

// ── MODAL ──
function openModal(id) {
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  document.getElementById('modalDate').textContent = `${s.dow}, ${s.day} ${s.month} 2026`;
  document.getElementById('modalTitle').textContent = s.topic;

  const d = designations[s.trainer];
  let trainerHtml;
  if (d && d.multi) {
    trainerHtml = d.multi.map(p =>
      `<div class="modal-row-value">${p.name}</div><div class="modal-row-sub">${p.title}</div>`
    ).join('<div style="margin-top:8px;"></div>');
  } else {
    trainerHtml = `<div class="modal-row-value">${s.trainer}</div>
      <div class="modal-row-sub">${d ? d.single : ''}</div>`;
  }

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-row">
      <div class="modal-row-icon">🕐</div>
      <div>
        <div class="modal-row-label">Scheduled Time</div>
        <div class="modal-row-value">${s.time}</div>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-row-icon">🧑‍🏫</div>
      <div>
        <div class="modal-row-label">Trainer</div>
        ${trainerHtml}
      </div>
    </div>
  `;

  const regLink = registrationLinks[s.topic];
  const regWrap = document.getElementById('modalRegisterWrap');
  if (regLink) {
    regWrap.innerHTML = `
      <a class="modal-register-btn" href="${regLink}" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Register Now
      </a>`;
  } else {
    regWrap.innerHTML = '';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });
